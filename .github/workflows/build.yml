name: Build APK - ReboCar Driver

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Install dependencies (runs postinstall patches)
        run: rm -f package-lock.json && npm install

      - name: Expo prebuild
        run: npx expo prebuild --clean --non-interactive --platform android
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Fix Gradle wrapper to 8.6
        run: sed -i 's/gradle-[0-9.]*-all\.zip/gradle-8.6-all.zip/' android/gradle/wrapper/gradle-wrapper.properties

      - name: Create signing keystore
        run: |
          keytool -genkeypair \
            -keystore android/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -noprompt

      - name: Set Android SDK path
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ReboCar-Driver-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
